<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FlipWise — Flashcard Quiz App</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #f5f0e8;
    --card-front: #1a1a2e;
    --card-back: #16213e;
    --accent: #e8a838;
    --accent2: #d4601a;
    --text-light: #f5f0e8;
    --text-dark: #1a1a2e;
    --surface: #fff9f0;
    --border: #d9cdb8;
    --shadow: rgba(26,26,46,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text-dark);
    min-height: 100vh;
    padding: 0 0 60px;
    background-image: radial-gradient(circle at 20% 30%, #e8d8b8 0%, transparent 50%),
                      radial-gradient(circle at 80% 70%, #d4c4a0 0%, transparent 50%);
  }

  header {
    background: var(--card-front);
    color: var(--text-light);
    padding: 22px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 4px 20px var(--shadow);
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    letter-spacing: 0.5px;
  }

  header h1 span { color: var(--accent); }

  .badge {
    background: var(--accent);
    color: var(--text-dark);
    font-size: 0.78rem;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  .main-wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 40px 20px 0;
  }

  /* Progress Bar */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 30px;
  }
  .progress-label {
    font-size: 0.85rem;
    font-weight: 500;
    color: #666;
    white-space: nowrap;
  }
  .progress-bar-bg {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 10px;
    transition: width 0.4s ease;
  }

  /* Flashcard */
  .card-scene {
    width: 100%;
    height: 320px;
    perspective: 1200px;
    margin-bottom: 28px;
    cursor: pointer;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.65s cubic-bezier(0.4, 0.2, 0.2, 1);
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    box-shadow: 0 16px 50px var(--shadow);
  }

  .card-front {
    background: var(--card-front);
    color: var(--text-light);
  }

  .card-back {
    background: linear-gradient(135deg, #16213e, #1a2a4a);
    color: var(--text-light);
    transform: rotateY(180deg);
    border: 2px solid var(--accent);
  }

  .card-tag {
    font-size: 0.72rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.5;
    margin-bottom: 18px;
    font-weight: 500;
  }

  .card-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.45rem;
    text-align: center;
    line-height: 1.5;
  }

  .card-hint {
    position: absolute;
    bottom: 18px;
    right: 22px;
    font-size: 0.72rem;
    opacity: 0.35;
    letter-spacing: 0.5px;
  }

  /* Buttons */
  .nav-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 30px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    padding: 12px 26px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.3px;
  }

  .btn:active { transform: scale(0.96); }

  .btn-primary {
    background: var(--card-front);
    color: var(--text-light);
  }
  .btn-primary:hover { background: #2d2d50; }

  .btn-accent {
    background: var(--accent);
    color: var(--text-dark);
  }
  .btn-accent:hover { background: #d49828; }

  .btn-outline {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text-dark);
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent2); }

  .btn-danger {
    background: #ff4d4d11;
    border: 1.5px solid #ff4d4d55;
    color: #c0392b;
  }
  .btn-danger:hover { background: #ff4d4d22; }

  /* Manage Section */
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .card-form {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 26px;
    margin-bottom: 28px;
  }

  .form-row {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 16px;
  }

  label {
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.5px;
    color: #555;
    text-transform: uppercase;
  }

  input, textarea {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    background: var(--bg);
    color: var(--text-dark);
    resize: vertical;
    transition: border-color 0.2s;
  }

  input:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  .form-actions { display: flex; gap: 10px; flex-wrap: wrap; }

  /* Card List */
  .card-list { display: flex; flex-direction: column; gap: 10px; }

  .card-list-item {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    transition: border-color 0.2s;
  }

  .card-list-item:hover { border-color: var(--accent); }

  .card-list-item.editing { border-color: var(--accent); background: #fffdf5; }

  .card-list-q {
    font-weight: 500;
    font-size: 0.92rem;
    flex: 1;
  }
  .card-list-a {
    font-size: 0.82rem;
    color: #888;
    margin-top: 2px;
    flex: 1;
  }

  .item-actions { display: flex; gap: 8px; }

  .btn-sm {
    padding: 7px 14px;
    font-size: 0.78rem;
    border-radius: 8px;
  }

  .empty-state {
    text-align: center;
    padding: 40px;
    color: #aaa;
    font-size: 0.95rem;
  }

  .flip-indicator {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 0.8rem;
    color: #999;
    margin-top: -16px;
    margin-bottom: 20px;
  }

  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); transition: background 0.3s; }
  .dot.active { background: var(--accent); }

  /* Modal for editing inline */
  .inline-edit {
    display: none;
    flex-direction: column;
    gap: 8px;
    margin-top: 10px;
  }
  .inline-edit.open { display: flex; }
</style>
</head>
<body>

<header>
  <h1>Flip<span>Wise</span></h1>
  <span class="badge" id="cardCountBadge">0 Cards</span>
</header>

<div class="main-wrap">

  <!-- Progress -->
  <div class="progress-row">
    <span class="progress-label" id="progressLabel">Card 0 of 0</span>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- Flashcard -->
  <div class="card-scene" id="cardScene" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <div class="card-tag">Question</div>
        <div class="card-text" id="questionText">Add your first card below to get started!</div>
        <div class="card-hint">Click to reveal answer ↓</div>
      </div>
      <div class="card-face card-back">
        <div class="card-tag">Answer</div>
        <div class="card-text" id="answerText">—</div>
        <div class="card-hint">Click to flip back ↑</div>
      </div>
    </div>
  </div>

  <!-- Flip dots -->
  <div class="flip-indicator">
    <div class="dot active" id="dotQ"></div>
    <div class="dot" id="dotA"></div>
    <span style="margin-left:6px; font-size:0.75rem;">tap card to flip</span>
  </div>

  <!-- Navigation -->
  <div class="nav-row">
    <button class="btn btn-outline" onclick="prevCard()">← Previous</button>
    <button class="btn btn-accent" onclick="flipCard()">Show Answer</button>
    <button class="btn btn-outline" onclick="nextCard()">Next →</button>
  </div>

  <!-- Add Card Form -->
  <div class="section-title">Manage Flashcards</div>

  <div class="card-form">
    <div class="form-row">
      <label>Question</label>
      <input type="text" id="inputQ" placeholder="e.g. What is the capital of France?" />
    </div>
    <div class="form-row">
      <label>Answer</label>
      <textarea id="inputA" rows="2" placeholder="e.g. Paris"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="addCard()">+ Add Card</button>
      <button class="btn btn-outline" onclick="clearForm()">Clear</button>
    </div>
  </div>

  <!-- Card List -->
  <div class="section-title">All Cards</div>
  <div class="card-list" id="cardList">
    <div class="empty-state">No flashcards yet. Add one above!</div>
  </div>

</div>

<script>
  let cards = [
    { q: "What is the powerhouse of the cell?", a: "The mitochondria — it produces ATP through cellular respiration." },
    { q: "What is Newton's Second Law of Motion?", a: "Force equals mass times acceleration: F = ma." },
    { q: "In what year did World War II end?", a: "1945 — with Germany surrendering in May and Japan in September." }
  ];

  let currentIndex = 0;
  let isFlipped = false;
  let editingIndex = -1;

  function updateCard() {
    const cardInner = document.getElementById('cardInner');
    const scene = document.getElementById('cardScene');

    if (cards.length === 0) {
      document.getElementById('questionText').textContent = "Add your first card below to get started!";
      document.getElementById('answerText').textContent = "—";
      document.getElementById('progressLabel').textContent = "Card 0 of 0";
      document.getElementById('progressFill').style.width = "0%";
      document.getElementById('cardCountBadge').textContent = "0 Cards";
      return;
    }

    isFlipped = false;
    cardInner.classList.remove('flipped');
    updateDots(false);

    const c = cards[currentIndex];
    document.getElementById('questionText').textContent = c.q;
    document.getElementById('answerText').textContent = c.a;
    document.getElementById('progressLabel').textContent = `Card ${currentIndex + 1} of ${cards.length}`;
    document.getElementById('progressFill').style.width = `${((currentIndex + 1) / cards.length) * 100}%`;
    document.getElementById('cardCountBadge').textContent = `${cards.length} Card${cards.length !== 1 ? 's' : ''}`;
  }

  function flipCard() {
    if (cards.length === 0) return;
    isFlipped = !isFlipped;
    document.getElementById('cardInner').classList.toggle('flipped', isFlipped);
    updateDots(isFlipped);
  }

  function updateDots(flipped) {
    document.getElementById('dotQ').classList.toggle('active', !flipped);
    document.getElementById('dotA').classList.toggle('active', flipped);
  }

  function nextCard() {
    if (cards.length === 0) return;
    currentIndex = (currentIndex + 1) % cards.length;
    updateCard();
  }

  function prevCard() {
    if (cards.length === 0) return;
    currentIndex = (currentIndex - 1 + cards.length) % cards.length;
    updateCard();
  }

  function addCard() {
    const q = document.getElementById('inputQ').value.trim();
    const a = document.getElementById('inputA').value.trim();
    if (!q || !a) { alert('Please fill in both the question and answer.'); return; }

    if (editingIndex >= 0) {
      cards[editingIndex] = { q, a };
      editingIndex = -1;
      document.querySelector('.btn-primary').textContent = '+ Add Card';
    } else {
      cards.push({ q, a });
      currentIndex = cards.length - 1;
    }

    clearForm();
    updateCard();
    renderList();
  }

  function clearForm() {
    document.getElementById('inputQ').value = '';
    document.getElementById('inputA').value = '';
    editingIndex = -1;
    document.querySelector('.btn-primary').textContent = '+ Add Card';
  }

  function editCard(i) {
    editingIndex = i;
    document.getElementById('inputQ').value = cards[i].q;
    document.getElementById('inputA').value = cards[i].a;
    document.querySelector('.btn-primary').textContent = '✓ Save Edit';
    document.getElementById('inputQ').focus();
    window.scrollTo({ top: document.querySelector('.card-form').offsetTop - 20, behavior: 'smooth' });
  }

  function deleteCard(i) {
    if (!confirm('Delete this flashcard?')) return;
    cards.splice(i, 1);
    if (currentIndex >= cards.length) currentIndex = Math.max(0, cards.length - 1);
    updateCard();
    renderList();
  }

  function renderList() {
    const list = document.getElementById('cardList');
    if (cards.length === 0) {
      list.innerHTML = '<div class="empty-state">No flashcards yet. Add one above!</div>';
      return;
    }
    list.innerHTML = cards.map((c, i) => `
      <div class="card-list-item ${editingIndex === i ? 'editing' : ''}">
        <div style="flex:1; min-width:0;">
          <div class="card-list-q">${escHtml(c.q)}</div>
          <div class="card-list-a">${escHtml(c.a)}</div>
        </div>
        <div class="item-actions">
          <button class="btn btn-outline btn-sm" onclick="editCard(${i})">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteCard(${i})">Delete</button>
        </div>
      </div>
    `).join('');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Init
  updateCard();
  renderList();
</script>
</body>
</html>
